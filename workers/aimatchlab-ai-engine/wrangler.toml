name = "aimatchlab-ai-engine"
main = "index.js"
compatibility_date = "2024-01-01"

# ---------------- KV ----------------
[[kv_namespaces]]
binding = "AIML_INGESTION_KV"
id = "a4173ef1d949403f9f1217e55ba275c3"

# ---------------- R2 ----------------
[[r2_buckets]]
binding = "AI_STATE"
bucket_name = "aimatchlab-ai-state"

[[r2_buckets]]
binding = "AI_RAW"
bucket_name = "aimatchlab-ai-raw"

# ---------------- VARS ----------------
[vars]
PRIMARY_API_BASE = "https://site.api.espn.com"
PRIMARY_API_PATH_TEMPLATE = "/apis/site/v2/sports/soccer/{league}/scoreboard?dates={start}-{end}"
ENGINE_MODE = "full-season"

# ---------------- CRON ----------------
[triggers]
crons = ["*/10 * * * *"]