name: Daily deploy snapshot

on:
  workflow_dispatch:
    inputs:
      dayKey:
        description: "Day key to build, YYYY-MM-DD. Leave empty for Europe/Athens today."
        required: false
        default: ""
      triggerRender:
        description: "Manual only: trigger Render redeploy after a daily snapshot commit."
        required: false
        default: "false"
  schedule:
    # GitHub scheduled workflows can start late or be dropped under load, so each
    # window keeps several retry slots.
    # Evening UTC 17-20 ≈ 20:00-23:00 Europe/Athens → PRE-BUILD TOMORROW (+deploy)
    #   so a day's full slate incl. 00:00-05:00 kickoffs is LIVE before midnight.
    # Early-morning UTC 21,22,23,0 ≈ 00:00-03:00 Athens → catch-up TODAY for
    #   leagues that landed after the evening pre-build.
    - cron: "17 17,18,19,20,21,22,23,0 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-deploy-snapshot
  cancel-in-progress: false

jobs:
  build-and-commit-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Resolve day key
        id: day
        shell: bash
        env:
          INPUT_DAY_KEY: ${{ inputs.dayKey }}
          INPUT_TRIGGER_RENDER: ${{ inputs.triggerRender }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          RAW_DAY_KEY="${INPUT_DAY_KEY:-}"
          DAY_KEY="$(printf "%s" "$RAW_DAY_KEY" | grep -Eo '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -n 1 || true)"

          ATHENS_HOUR="$(TZ=Europe/Athens date +%H)"
          ATHENS_MINUTE="$(TZ=Europe/Athens date +%M)"
          ATHENS_HOUR_NUM=$((10#$ATHENS_HOUR))

          if [ "$EVENT_NAME" = "schedule" ] && [ -z "$DAY_KEY" ]; then
            # Pick the target day from the Athens clock (a manual dispatch with an
            # explicit dayKey bypasses this entirely):
            #   Evening 18:00-23:59 → build TOMORROW so its full slate (incl. the
            #     00:00-05:00 kickoffs) is ready + deployed BEFORE midnight.
            #   Early morning 00:00-05:59 → catch-up build of TODAY for leagues
            #     that landed after the evening pre-build.
            #   Any other hour → self-skip.
            if [ "$ATHENS_HOUR_NUM" -ge 18 ] && [ "$ATHENS_HOUR_NUM" -le 23 ]; then
              DAY_KEY="$(TZ=Europe/Athens date -d 'tomorrow' +%F)"
              echo "Evening pre-build window ($ATHENS_HOUR:$ATHENS_MINUTE Athens) → TOMORROW $DAY_KEY"
            elif [ "$ATHENS_HOUR_NUM" -le 5 ]; then
              DAY_KEY="$(TZ=Europe/Athens date +%F)"
              echo "Early-morning catch-up window ($ATHENS_HOUR:$ATHENS_MINUTE Athens) → TODAY $DAY_KEY"
            else
              echo "Skipping scheduled run outside evening(18-23)/early-morning(00-05) Europe/Athens. Athens time: $ATHENS_HOUR:$ATHENS_MINUTE"
              echo "skipBuild=true" >> "$GITHUB_OUTPUT"
              echo "SKIP_BUILD=true" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if [ -z "$DAY_KEY" ]; then
            DAY_KEY="$(TZ=Europe/Athens date +%F)"
          fi

          if ! printf "%s" "$DAY_KEY" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "ERROR: invalid DAY_KEY=$DAY_KEY"
            exit 1
          fi

          echo "skipBuild=false" >> "$GITHUB_OUTPUT"
          echo "SKIP_BUILD=false" >> "$GITHUB_ENV"
          echo "dayKey=$DAY_KEY" >> "$GITHUB_OUTPUT"
          echo "DAY_KEY=$DAY_KEY" >> "$GITHUB_ENV"

          # run-daily-cycle finalizes (and now re-settles the value picks of)
          # the previous day. Expose that key so the re-settled yesterday value
          # artifacts can be staged + allow-listed alongside DAY_KEY.
          FINALIZE_DAY_KEY="$(TZ=Europe/Athens date -d "${DAY_KEY} -1 day" +%F)"
          echo "FINALIZE_DAY_KEY=$FINALIZE_DAY_KEY" >> "$GITHUB_ENV"
          echo "Resolved FINALIZE_DAY_KEY=$FINALIZE_DAY_KEY"

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "${INPUT_TRIGGER_RENDER:-false}" = "true" ]; then
            echo "ALLOW_RENDER_DEPLOY=true" >> "$GITHUB_ENV"
            echo "Render redeploy allowed for this manual daily run."
          elif [ "$EVENT_NAME" = "schedule" ]; then
            # Scheduled runs now DEPLOY: the pre-built snapshot (tomorrow in the
            # evening window, today in the morning catch-up) must reach the live
            # engine's disk so the new day's matches — including 00:00-05:00
            # kickoffs — are served at day-change without waiting for the first
            # intraday deploy at 07:00 Athens (by when early matches are over).
            echo "ALLOW_RENDER_DEPLOY=true" >> "$GITHUB_ENV"
            echo "Render redeploy enabled for scheduled pre-build/catch-up run."
          else
            echo "ALLOW_RENDER_DEPLOY=false" >> "$GITHUB_ENV"
            echo "Render redeploy disabled for this daily run."
          fi
          echo "Resolved DAY_KEY=$DAY_KEY"

      - name: Install root dependencies
        if: env.SKIP_BUILD != 'true'
        run: npm install --no-audit --no-fund

      - name: Install engine dependencies
        if: env.SKIP_BUILD != 'true'
        working-directory: engine-v1
        run: npm install --no-audit --no-fund

      - name: Run rolling fixture acquisition chunks
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Daily full-pass fixture acquisition"
          node ./engine-v1/jobs/run-fixture-acquisition-chunk.js "$DAY_KEY" --full-pass --days-back 1 --days-forward 14

          if [ -f "data/coverage-reports/${DAY_KEY}.json" ]; then
            echo "=== Fixture acquisition coverage report ==="
            node -e 'const fs=require("fs"); const day=process.env.DAY_KEY; const file="data/coverage-reports/"+day+".json"; const r=JSON.parse(fs.readFileSync(file,"utf8")); console.log(JSON.stringify({baseDayKey:r.baseDayKey,selectedLeagues:r.selectedLeagues,summary:r.summary,coverage:r.coverage},null,2));'
          else
            echo "WARNING: no fixture acquisition coverage report written for ${DAY_KEY}"
          fi

      - name: Prune canonical fixture store
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/prune-canonical-fixture-store.js "$DAY_KEY" --days-back 3 --days-forward 30

      - name: Commit canonical fixture acquisition store
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          git restore --staged . || true

          if [ -d "data/canonical-fixtures" ]; then
            git add data/canonical-fixtures
          fi

          if [ -d "data/coverage-reports" ]; then
            git add data/coverage-reports
          fi

          if [ -d "data/ingest-state" ]; then
            git add data/ingest-state
          fi

          # --allow-data-deletions: the prune step above intentionally drops
          # canonical-fixtures/<day> and coverage-reports/<day>.json OUTSIDE the
          # rolling [-3,+30] retention window. These are a REGENERABLE rolling
          # acquisition store (permanent truth lives in league-memory/history),
          # so their retention deletions are by-design — without this flag the
          # data-deletion guard fails the whole daily snapshot once the window
          # advances past a committed day (broke the pipeline from 2026-07-01).
          # Additions are still confined to the three prune dirs by --allow.
          node engine-v1/jobs/guard-staged-data-boundary.js \
            --label=daily-deploy-canonical-store \
            --allow-data-deletions \
            --allow='^(data/canonical-fixtures/|data/coverage-reports/|data/ingest-state/)'
          echo "=== CANONICAL STORE STAGED FILES OUTSIDE ALLOWLIST - SHOULD BE EMPTY ==="
          DISALLOWED="$(git diff --cached --name-only | grep -Ev '^(data/canonical-fixtures/|data/coverage-reports/|data/ingest-state/)' || true)"

          if [ -n "$DISALLOWED" ]; then
            echo "ERROR: disallowed canonical store files staged:"
            echo "$DISALLOWED"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No canonical fixture acquisition changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Update canonical fixture acquisition store for $DAY_KEY"
            bash tools/git-push-rebase-retry.sh
          fi

      - name: Run daily cycle
        if: env.SKIP_BUILD != 'true'
        env:
          # Transfermarkt blocks the GitHub Actions IP range; the team-news
          # absences acquisition inside the cycle fetches TM through the proxy.
          TM_PROXY_URL: ${{ secrets.TM_PROXY_URL }}
          # Per-bookmaker odds (multi-odds → consensus middle line + EU/Asian/
          # Betfair right panels). Free tier; without it fetchMultiBookmakerOdds
          # returns no_key and every day's multi-odds file stays empty.
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: node ./engine-v1/jobs/run-daily-cycle.js "$DAY_KEY"

      - name: Run team geo enrichment
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/run-team-geo-enrichment-day.js "$DAY_KEY" --min-coverage=80 --limit=40 --delay-ms=900 --row-timeout-ms=16000

      - name: Rebuild details after geo
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/build-details-day.js "$DAY_KEY" --rebuild

      - name: Export deploy snapshot
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/export-deploy-snapshot-day.js "$DAY_KEY"

      - name: Refresh value artifacts after final canonical snapshot
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/refresh-value-artifacts-day.js --date="$DAY_KEY"

      - name: Build cumulative value comparison
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/build-value-comparison-cumulative.js --write

      # Re-run AFTER the final export so the committed report describes THIS
      # manifest — the in-cycle run predates the geo rebuild + re-export above
      # and was permanently stale vs manifest.generatedAt (audit P1). Auto-fixes
      # it applies to detail files are staged with the day dir. Never blocks
      # here; the pre-publish "Invariant gate" below is the hard stop.
      - name: Refresh snapshot invariant report
        if: env.SKIP_BUILD != 'true'
        continue-on-error: true
        run: node ./engine-v1/jobs/run-snapshot-invariant-check.js "$DAY_KEY"

      - name: Snapshot fixture coverage floor
        if: env.SKIP_BUILD != 'true'
        continue-on-error: true
        shell: bash
        run: |
          node ./engine-v1/jobs/verify-deploy-snapshot-fixture-coverage-floor-file.js --date="$DAY_KEY" --min-fixtures=20 --min-leagues=5 --use-manifest-min-targets --output "data/football-truth/_diagnostics/deploy-snapshot-fixture-coverage-floor/${DAY_KEY}.deploy-snapshot-fixture-coverage-floor.json"

      - name: Snapshot verification
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");

          const day = process.env.DAY_KEY;
          const manifestFile = `data/deploy-snapshots/${day}/manifest.json`;
          const valueFile = `data/deploy-snapshots/${day}/value.json`;
          const detailsDir = `data/deploy-snapshots/${day}/details`;

          if (!fs.existsSync(manifestFile)) {
            throw new Error(`missing manifest: ${manifestFile}`);
          }

          const manifest = JSON.parse(fs.readFileSync(manifestFile, "utf8"));
          const value = fs.existsSync(valueFile) ? JSON.parse(fs.readFileSync(valueFile, "utf8")) : null;
          const details = fs.existsSync(detailsDir) ? fs.readdirSync(detailsDir).filter(f => f.endsWith(".json")) : [];

          console.log(JSON.stringify({
            date: manifest.date,
            hash: manifest.hash,
            counts: manifest.counts,
            coverage: manifest.coverage,
            valueCount: value ? value.count : 0,
            valuePicks: value && Array.isArray(value.picks) ? value.picks.length : 0,
            detailsFiles: details.length,
            warnings: [
              !value ? "value.json missing — low-fixture day (WC/tournament week?)" : null,
              !details.length ? "zero detail files — low-fixture day (WC/tournament week?)" : null
            ].filter(Boolean)
          }, null, 2));

          if (manifest.date !== day) {
            throw new Error(`manifest date mismatch: expected ${day}, got ${manifest.date}`);
          }

          if (!details.length) {
            console.warn("WARNING: snapshot has zero detail files — continuing (low-fixture day)");
          }
          NODE

      - name: Configure git author
        if: env.SKIP_BUILD != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # TRUTH FIRST, UNGATED: history, standings, team-geo, team-news,
      # multi-odds and coverage-readiness are harvested truth — they commit
      # unconditionally BEFORE any publish gate. A gate failure must only ever
      # stop the snapshot publish, never discard collected truth (2026-07-07
      # Gap B lesson: a verify step that skipped the commit threw away every
      # harvested result roughly every second night).
      - name: Persist truth artifacts (ungated)
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          git restore --staged . || true

          if compgen -G "data/team-geo/*.json" > /dev/null; then
            git add data/team-geo/*.json
          fi

          # Per-bookmaker openings, incl. prefetched future-day (D+1..D+6) lines,
          # so the frozen opening exists on match day. Runs on a US-IP runner
          # (OddsPortal geo-blocks GR). Output was previously never committed.
          if compgen -G "data/multi-odds/*.json" > /dev/null; then
            git add data/multi-odds/*.json
          fi

          for team_news_file in \
            "data/team-news/_worksets/${DAY_KEY}.json" \
            "data/team-news/_research-tasks/${DAY_KEY}.json" \
            "data/team-news/_research-results/${DAY_KEY}.json" \
            "data/team-news/_research-review/${DAY_KEY}.json" \
            "data/team-news/_reports/${DAY_KEY}.json" \
            "data/team-news/_reports/${DAY_KEY}.transfermarkt.json"
          do
            if [ -f "$team_news_file" ]; then
              git add -f "$team_news_file"
            fi
          done

          # run-daily-cycle appends the finalized previous day into
          # data/history/<season>.json (appendFinalizedDayToHistory). This was
          # never committed, so every day's finalized matches were appended on
          # the runner and discarded — the committed season history froze at
          # its last manual commit and the form indexes were built stale.
          if compgen -G "data/history/????-????.json" > /dev/null; then
            git add data/history/????-????.json
          fi

          # Derived store report (build-history-report.js) — regenerated by the
          # cycle right after the history append so it always mirrors the store.
          if compgen -G "data/history/????-????.report.json" > /dev/null; then
            git add data/history/????-????.report.json
          fi

          # buildStandingsDay rebuilds data/standings/<slug>.json on the runner
          # every night, but nothing staged them — the committed store froze
          # (last real commit 2026-05-03) and Render served months-old tables
          # on /standings while details were built from runner-fresh ones.
          if compgen -G "data/standings/*.json" > /dev/null; then
            git add data/standings/*.json
          fi

          # run-daily-cycle writes the league gap report (BROKEN/lost tracking)
          # to data/coverage-readiness/<day>.json. It was generated on the
          # runner and discarded, so multi-day readiness could not be audited.
          if [ -f "data/coverage-readiness/${DAY_KEY}.json" ]; then
            git add "data/coverage-readiness/${DAY_KEY}.json"
          fi

          # Canonical FT upgrades written DURING the cycle (finalize live
          # refresh + results-truth sweeps, incl. the D-2..D-7 catch-up). The
          # canonical acquisition commit runs BEFORE the cycle, so these
          # upgrades were regenerated on the runner every night and discarded
          # (2026-07-07 logs: the same 55 rows of 07-05 and 86 rows of 07-04
          # re-upgraded nightly; Keflavik's swept FT never reached origin).
          if [ -d "data/canonical-fixtures" ]; then
            git add data/canonical-fixtures
          fi

          node engine-v1/jobs/guard-staged-data-boundary.js \
            --label=daily-deploy-truth \
            --dayKey="${DAY_KEY}" \
            --allow="^(data/team-geo/[^/]+\.json$|data/multi-odds/[0-9]{4}-[0-9]{2}-[0-9]{2}\.json$|data/team-news/(_worksets|_research-tasks|_research-results|_research-review|_reports)/${DAY_KEY}(\.transfermarkt)?\.json$|data/history/[0-9]{4}-[0-9]{4}(\.report)?\.json$|data/coverage-readiness/${DAY_KEY}\.json$|data/standings/[^/]+\.json$|data/canonical-fixtures/)"

          echo "=== TRUTH STAGED FILES OUTSIDE ALLOWLIST - SHOULD BE EMPTY ==="
          DISALLOWED="$(git diff --cached --name-only | grep -Ev '^(data/team-geo/|data/multi-odds/|data/team-news/(_worksets|_research-tasks|_research-results|_research-review|_reports)/|data/history/[0-9]{4}-[0-9]{4}(\.report)?\.json$|data/coverage-readiness/|data/standings/|data/canonical-fixtures/)' || true)"

          if [ -n "$DISALLOWED" ]; then
            echo "ERROR: disallowed truth files staged:"
            echo "$DISALLOWED"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No truth artifact changes to commit."
          else
            git commit -m "Persist daily truth artifacts for ${DAY_KEY}"
            bash tools/git-push-rebase-retry.sh
          fi

      # PUBLISH GATE 1 — freshness: the snapshot must not be older than the
      # canonical/expected/coverage inputs it was built from (2026-07-07:
      # manifest 05:33Z shipped while uefa.champions canonical landed 07:31Z —
      # 10 CL qualifiers existed in the store but not in the UI). One
      # self-heal attempt re-exports; then the gate is hard. Truth is already
      # committed above, so failing here only stops the snapshot publish.
      - name: Artifact freshness gate (self-heal, pre-publish)
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if ! node ./engine-v1/jobs/verify-artifact-freshness-day.js --date="$DAY_KEY" --gate; then
            echo "Snapshot stale against upstream inputs; rebuilding details, re-exporting, and refreshing Value artifacts."
            node ./engine-v1/jobs/build-details-day.js "$DAY_KEY" --rebuild
            node ./engine-v1/jobs/export-deploy-snapshot-day.js "$DAY_KEY"
            node ./engine-v1/jobs/refresh-value-artifacts-day.js --date="$DAY_KEY"
            node ./engine-v1/jobs/build-value-comparison-cumulative.js --write
            node ./engine-v1/jobs/run-snapshot-invariant-check.js "$DAY_KEY" || true
          fi
          node ./engine-v1/jobs/verify-artifact-freshness-day.js --date="$DAY_KEY" --gate

      # PUBLISH GATE 2 — invariants: blocked issues (duplicate canonicalId,
      # value-count mismatches, stale report vs manifest) stop the snapshot
      # BEFORE it is committed. Previously post-commit only, which shipped the
      # broken snapshot and merely turned the run red.
      - name: Invariant gate (pre-publish)
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: node ./engine-v1/jobs/run-snapshot-invariant-check.js "$DAY_KEY" --gate

      # PUBLISH GATE 3 — value artifact: value.json with
      # source=missing_local_value_file while fixtures exist is a
      # value-pipeline failure dressed up as "no picks today" (2026-07-02
      # outage mode). It must not ship.
      - name: Value artifact gate (pre-publish)
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: node engine-v1/jobs/check-value-artifact-gate.js --date="${DAY_KEY}"

      # Autonomy scoreboard: one self-describing report per day rolling up
      # universe parity, acquisition, freshness, invariants, value and
      # settlement into a single clean/not-clean verdict. Consecutive clean
      # days are the Definition-of-Done streak for the autonomous mechanism.
      - name: Build day report
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/build-day-report.js --date="$DAY_KEY"

      - name: Build system health alert artifact
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/build-system-health-alerts-day.js --date="$DAY_KEY"

      - name: Sync System Health GitHub issue
        if: env.SKIP_BUILD != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node ./engine-v1/jobs/sync-system-health-github-issue.js --date="$DAY_KEY"

      - name: Stage allowed snapshot files only
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          git restore --staged . || true

          git add data/deploy-snapshots/latest.json
          git add "data/deploy-snapshots/${DAY_KEY}/"

          if [ -f "data/build-reports/${DAY_KEY}.json" ]; then
            git add "data/build-reports/${DAY_KEY}.json"
          fi

          if [ -f "data/system-health/${DAY_KEY}.json" ]; then
            git add "data/system-health/${DAY_KEY}.json"
          fi

          if [ -f "data/system-health/latest.json" ]; then
            git add "data/system-health/latest.json"
          fi

          if [ -f "data/value/${DAY_KEY}.json" ]; then
            git add "data/value/${DAY_KEY}.json"
          fi

          if [ -f "data/value/_audit/${DAY_KEY}.json" ]; then
            git add "data/value/_audit/${DAY_KEY}.json"
          fi

          if [ -d "data/value-plans/${DAY_KEY}" ]; then
            git add "data/value-plans/${DAY_KEY}/"
          fi

          if [ -f "data/value-comparison/${DAY_KEY}.json" ]; then
            git add "data/value-comparison/${DAY_KEY}.json"
          fi

          # Re-settled value picks + re-exported snapshots for RECENT days
          # (D-1..D-7): run-daily-cycle's finalize resettle covers yesterday
          # and the history catch-up now re-settles any recent day whose
          # truth arrived late (Keflavik case: the 07-06 final only reached
          # the truth store via 07-07's harvest). Without staging these the
          # WIN/LOSS would regenerate on the runner every night and be
          # discarded, leaving the committed export permanently UNRESOLVED.
          RECENT_KEYS=""
          for back in 1 2 3 4 5 6 7; do
            RECENT_KEYS="$RECENT_KEYS $(TZ=Europe/Athens date -d "${DAY_KEY} -${back} day" +%F)"
          done
          echo "Recent settlement window:${RECENT_KEYS}"

          for k in ${RECENT_KEYS}; do
            if [ -d "data/deploy-snapshots/$k" ]; then
              git add "data/deploy-snapshots/$k/"
            fi
            if [ -d "data/value-plans/$k" ]; then
              git add "data/value-plans/$k/"
            fi
            if [ -f "data/value-comparison/$k.json" ]; then
              git add "data/value-comparison/$k.json"
            fi
            if [ -d "data/final-results/$k" ]; then
              git add "data/final-results/$k/"
            fi
          done

          if [ -d "data/final-results/${DAY_KEY}" ]; then
            git add "data/final-results/${DAY_KEY}/"
          fi

          if [ -f "data/value-comparison/cumulative.json" ]; then
            git add "data/value-comparison/cumulative.json"
          fi

          RECENT_ALT="$(echo ${RECENT_KEYS} | tr ' ' '|')"
          RECENT_CSV="$(echo ${RECENT_KEYS} | tr ' ' ',')"

          node engine-v1/jobs/guard-staged-data-boundary.js \
            --label=daily-deploy-snapshot \
            --dayKey="${DAY_KEY}" \
            --extra-days="${RECENT_CSV}" \
            --allow="^(data/deploy-snapshots/latest\.json$|data/deploy-snapshots/(${DAY_KEY}|${RECENT_ALT})/|data/build-reports/${DAY_KEY}\.json$|data/system-health/${DAY_KEY}\.json$|data/system-health/latest\.json$|data/value/${DAY_KEY}\.json$|data/value/_audit/${DAY_KEY}\.json$|data/value-plans/(${DAY_KEY}|${RECENT_ALT})/|data/value-comparison/(${DAY_KEY}|${RECENT_ALT})\.json$|data/value-comparison/cumulative\.json$|data/final-results/(${DAY_KEY}|${RECENT_ALT})/)"

          echo "=== STAGED FILES OUTSIDE ALLOWLIST - SHOULD BE EMPTY ==="
          DISALLOWED="$(git diff --cached --name-only | grep -Ev '^(data/deploy-snapshots/|data/build-reports/|data/system-health/|data/value/|data/value-plans/|data/value-comparison/|data/final-results/)' || true)"

          if [ -n "$DISALLOWED" ]; then
            echo "ERROR: disallowed files staged:"
            echo "$DISALLOWED"
            exit 1
          fi

          echo "=== STAGED COUNT ==="
          git diff --cached --name-only | wc -l

      - name: Commit and push snapshot
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            echo "DAILY_SNAPSHOT_COMMITTED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          git commit -m "Auto refresh deploy snapshot for ${DAY_KEY}"
          bash tools/git-push-rebase-retry.sh
          echo "DAILY_SNAPSHOT_COMMITTED=true" >> "$GITHUB_ENV"

      - name: Skip Render redeploy for daily snapshot
        if: env.SKIP_BUILD != 'true' && env.DAILY_SNAPSHOT_COMMITTED == 'true' && env.ALLOW_RENDER_DEPLOY != 'true'
        run: echo "Daily snapshot committed, but Render redeploy is disabled for this run."

      - name: Trigger Render redeploy after daily snapshot
        if: env.SKIP_BUILD != 'true' && env.DAILY_SNAPSHOT_COMMITTED == 'true' && env.ALLOW_RENDER_DEPLOY == 'true'
        shell: bash
        env:
          RENDER_ENGINE_DEPLOY_HOOK_URL: ${{ secrets.RENDER_ENGINE_DEPLOY_HOOK_URL }}
          RENDER_UI_DEPLOY_HOOK_URL: ${{ secrets.RENDER_UI_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail

          if [ -n "${RENDER_ENGINE_DEPLOY_HOOK_URL:-}" ]; then
            echo "Triggering Render engine redeploy after daily snapshot..."
            curl -fsS -X POST "${RENDER_ENGINE_DEPLOY_HOOK_URL}"
          else
            echo "RENDER_ENGINE_DEPLOY_HOOK_URL is not configured; skipping engine redeploy trigger."
          fi

          if [ -n "${RENDER_UI_DEPLOY_HOOK_URL:-}" ]; then
            echo "Triggering Render UI redeploy after daily snapshot..."
            curl -fsS -X POST "${RENDER_UI_DEPLOY_HOOK_URL}"
          else
            echo "RENDER_UI_DEPLOY_HOOK_URL is not configured; skipping UI redeploy trigger."
          fi
