name: Daily deploy snapshot

on:
  workflow_dispatch:
    inputs:
      dayKey:
        description: "Day key to build, YYYY-MM-DD. Leave empty for Europe/Athens today."
        required: false
        default: ""
      triggerRender:
        description: "Manual only: trigger Render redeploy after a daily snapshot commit."
        required: false
        default: "false"
  schedule:
    # Multiple retry slots. GitHub scheduled workflows can start late or be dropped under load.
    # These UTC slots cover roughly 00:17-03:17 Europe/Athens across DST/standard time.
    - cron: "17 21,22,23,0 * * *"

permissions:
  contents: write

concurrency:
  group: daily-deploy-snapshot
  cancel-in-progress: false

jobs:
  build-and-commit-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Resolve day key
        id: day
        shell: bash
        env:
          INPUT_DAY_KEY: ${{ inputs.dayKey }}
          INPUT_TRIGGER_RENDER: ${{ inputs.triggerRender }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          RAW_DAY_KEY="${INPUT_DAY_KEY:-}"
          DAY_KEY="$(printf "%s" "$RAW_DAY_KEY" | grep -Eo '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -n 1 || true)"

          ATHENS_HOUR="$(TZ=Europe/Athens date +%H)"
          ATHENS_MINUTE="$(TZ=Europe/Athens date +%M)"
          ATHENS_HOUR_NUM=$((10#$ATHENS_HOUR))

          if [ "$EVENT_NAME" = "schedule" ]; then
            # GitHub scheduled workflows are not guaranteed to start at the exact cron minute.
            # Accept a wider early-morning Athens window so delayed scheduled runs still build.
            if [ "$ATHENS_HOUR_NUM" -gt 5 ]; then
              echo "Skipping scheduled run outside 00:00-05:59 Europe/Athens. Athens time: $ATHENS_HOUR:$ATHENS_MINUTE"
              echo "skipBuild=true" >> "$GITHUB_OUTPUT"
              echo "SKIP_BUILD=true" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if [ -z "$DAY_KEY" ]; then
            DAY_KEY="$(TZ=Europe/Athens date +%F)"
          fi

          if ! printf "%s" "$DAY_KEY" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "ERROR: invalid DAY_KEY=$DAY_KEY"
            exit 1
          fi

          echo "skipBuild=false" >> "$GITHUB_OUTPUT"
          echo "SKIP_BUILD=false" >> "$GITHUB_ENV"
          echo "dayKey=$DAY_KEY" >> "$GITHUB_OUTPUT"
          echo "DAY_KEY=$DAY_KEY" >> "$GITHUB_ENV"

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "${INPUT_TRIGGER_RENDER:-false}" = "true" ]; then
            echo "ALLOW_RENDER_DEPLOY=true" >> "$GITHUB_ENV"
            echo "Render redeploy allowed for this manual daily run."
          elif [ "$EVENT_NAME" = "schedule" ]; then
            echo "ALLOW_RENDER_DEPLOY=false" >> "$GITHUB_ENV"
            echo "Render redeploy disabled for scheduled daily snapshot runs."
          else
            echo "ALLOW_RENDER_DEPLOY=false" >> "$GITHUB_ENV"
            echo "Render redeploy disabled for this daily run."
          fi
          echo "Resolved DAY_KEY=$DAY_KEY"

      - name: Install root dependencies
        if: env.SKIP_BUILD != 'true'
        run: npm install --no-audit --no-fund

      - name: Install engine dependencies
        if: env.SKIP_BUILD != 'true'
        working-directory: engine-v1
        run: npm install --no-audit --no-fund

      - name: Run rolling fixture acquisition chunks
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Daily full-pass fixture acquisition"
          node ./engine-v1/jobs/run-fixture-acquisition-chunk.js "$DAY_KEY" --full-pass --days-back 1 --days-forward 14

          if [ -f "data/coverage-reports/${DAY_KEY}.json" ]; then
            echo "=== Fixture acquisition coverage report ==="
            node -e 'const fs=require("fs"); const day=process.env.DAY_KEY; const file="data/coverage-reports/"+day+".json"; const r=JSON.parse(fs.readFileSync(file,"utf8")); console.log(JSON.stringify({baseDayKey:r.baseDayKey,selectedLeagues:r.selectedLeagues,summary:r.summary,coverage:r.coverage},null,2));'
          else
            echo "WARNING: no fixture acquisition coverage report written for ${DAY_KEY}"
          fi

      - name: Prune canonical fixture store
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/prune-canonical-fixture-store.js "$DAY_KEY" --days-back 3 --days-forward 30

      - name: Commit canonical fixture acquisition store
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          git restore --staged . || true

          if [ -d "data/canonical-fixtures" ]; then
            git add data/canonical-fixtures
          fi

          if [ -d "data/coverage-reports" ]; then
            git add data/coverage-reports
          fi

          if [ -d "data/ingest-state" ]; then
            git add data/ingest-state
          fi

          echo "=== CANONICAL STORE STAGED FILES OUTSIDE ALLOWLIST - SHOULD BE EMPTY ==="
          DISALLOWED="$(git diff --cached --name-only | grep -Ev '^(data/canonical-fixtures/|data/coverage-reports/|data/ingest-state/)' || true)"

          if [ -n "$DISALLOWED" ]; then
            echo "ERROR: disallowed canonical store files staged:"
            echo "$DISALLOWED"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No canonical fixture acquisition changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Update canonical fixture acquisition store for $DAY_KEY"
            git push
          fi

      - name: Run daily cycle
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/run-daily-cycle.js "$DAY_KEY"

      - name: Run team geo enrichment
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/run-team-geo-enrichment-day.js "$DAY_KEY" --min-coverage=80 --limit=40 --delay-ms=900 --row-timeout-ms=16000

      - name: Rebuild details after geo
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/build-details-day.js "$DAY_KEY" --rebuild

      - name: Export deploy snapshot
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/export-deploy-snapshot-day.js "$DAY_KEY"

      - name: Snapshot fixture coverage floor
        if: env.SKIP_BUILD != 'true'
        continue-on-error: true
        shell: bash
        run: |
          node ./engine-v1/jobs/verify-deploy-snapshot-fixture-coverage-floor-file.js --date="$DAY_KEY" --min-fixtures=20 --min-leagues=5 --use-manifest-min-targets --output "data/football-truth/_diagnostics/deploy-snapshot-fixture-coverage-floor/${DAY_KEY}.deploy-snapshot-fixture-coverage-floor.json"

      - name: Snapshot verification
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");

          const day = process.env.DAY_KEY;
          const manifestFile = `data/deploy-snapshots/${day}/manifest.json`;
          const valueFile = `data/deploy-snapshots/${day}/value.json`;
          const detailsDir = `data/deploy-snapshots/${day}/details`;

          if (!fs.existsSync(manifestFile)) {
            throw new Error(`missing manifest: ${manifestFile}`);
          }

          const manifest = JSON.parse(fs.readFileSync(manifestFile, "utf8"));
          const value = fs.existsSync(valueFile) ? JSON.parse(fs.readFileSync(valueFile, "utf8")) : null;
          const details = fs.existsSync(detailsDir) ? fs.readdirSync(detailsDir).filter(f => f.endsWith(".json")) : [];

          console.log(JSON.stringify({
            date: manifest.date,
            hash: manifest.hash,
            counts: manifest.counts,
            coverage: manifest.coverage,
            valueCount: value ? value.count : 0,
            valuePicks: value && Array.isArray(value.picks) ? value.picks.length : 0,
            detailsFiles: details.length,
            warnings: [
              !value ? "value.json missing — low-fixture day (WC/tournament week?)" : null,
              !details.length ? "zero detail files — low-fixture day (WC/tournament week?)" : null
            ].filter(Boolean)
          }, null, 2));

          if (manifest.date !== day) {
            throw new Error(`manifest date mismatch: expected ${day}, got ${manifest.date}`);
          }

          if (!details.length) {
            console.warn("WARNING: snapshot has zero detail files — continuing (low-fixture day)");
          }
          NODE

      - name: Configure git author
        if: env.SKIP_BUILD != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Stage allowed generated files only
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          git restore --staged . || true

          git add data/deploy-snapshots/latest.json
          git add "data/deploy-snapshots/${DAY_KEY}/"

          if compgen -G "data/team-geo/*.json" > /dev/null; then
            git add data/team-geo/*.json
          fi

          for team_news_file in \
            "data/team-news/_worksets/${DAY_KEY}.json" \
            "data/team-news/_research-tasks/${DAY_KEY}.json" \
            "data/team-news/_research-results/${DAY_KEY}.json" \
            "data/team-news/_research-review/${DAY_KEY}.json" \
            "data/team-news/_reports/${DAY_KEY}.json"
          do
            if [ -f "$team_news_file" ]; then
              git add -f "$team_news_file"
            fi
          done

          echo "=== STAGED FILES OUTSIDE ALLOWLIST - SHOULD BE EMPTY ==="
          DISALLOWED="$(git diff --cached --name-only | grep -Ev '^(data/deploy-snapshots/|data/team-geo/|data/team-news/(_worksets|_research-tasks|_research-results|_research-review|_reports)/)' || true)"

          if [ -n "$DISALLOWED" ]; then
            echo "ERROR: disallowed files staged:"
            echo "$DISALLOWED"
            exit 1
          fi

          echo "=== STAGED COUNT ==="
          git diff --cached --name-only | wc -l

      - name: Commit and push snapshot
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          if git diff --cached --quiet; then
            echo "No snapshot or geo changes to commit."
            echo "DAILY_SNAPSHOT_COMMITTED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          git commit -m "Auto refresh deploy snapshot for ${DAY_KEY}"
          git push
          echo "DAILY_SNAPSHOT_COMMITTED=true" >> "$GITHUB_ENV"

      - name: Skip Render redeploy for daily snapshot
        if: env.SKIP_BUILD != 'true' && env.DAILY_SNAPSHOT_COMMITTED == 'true' && env.ALLOW_RENDER_DEPLOY != 'true'
        run: echo "Daily snapshot committed, but Render redeploy is disabled for this run."

      - name: Trigger Render redeploy after daily snapshot
        if: env.SKIP_BUILD != 'true' && env.DAILY_SNAPSHOT_COMMITTED == 'true' && env.ALLOW_RENDER_DEPLOY == 'true'
        shell: bash
        env:
          RENDER_ENGINE_DEPLOY_HOOK_URL: ${{ secrets.RENDER_ENGINE_DEPLOY_HOOK_URL }}
          RENDER_UI_DEPLOY_HOOK_URL: ${{ secrets.RENDER_UI_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail

          if [ -n "${RENDER_ENGINE_DEPLOY_HOOK_URL:-}" ]; then
            echo "Triggering Render engine redeploy after daily snapshot..."
            curl -fsS -X POST "${RENDER_ENGINE_DEPLOY_HOOK_URL}"
          else
            echo "RENDER_ENGINE_DEPLOY_HOOK_URL is not configured; skipping engine redeploy trigger."
          fi

          if [ -n "${RENDER_UI_DEPLOY_HOOK_URL:-}" ]; then
            echo "Triggering Render UI redeploy after daily snapshot..."
            curl -fsS -X POST "${RENDER_UI_DEPLOY_HOOK_URL}"
          else
            echo "RENDER_UI_DEPLOY_HOOK_URL is not configured; skipping UI redeploy trigger."
          fi
