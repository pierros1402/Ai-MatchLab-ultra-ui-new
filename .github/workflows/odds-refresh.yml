name: Odds refresh

# Autonomous bookmaker-odds capture. Runs hourly but self-gates to the real
# policy (every 8h, plus hourly within 4h before a kickoff) and commits the odds
# snapshot ONLY when it materially changes — so deploys stay few (free plan).
# Render redeploy is intentionally NOT triggered here; it stays manual.

on:
  workflow_dispatch:
    inputs:
      dayKey:
        description: "Day key, YYYY-MM-DD. Empty = Europe/Athens today."
        required: false
        default: ""
      force:
        description: "Force a scrape even if not due."
        required: false
        default: "false"
  schedule:
    - cron: "27 * * * *"   # hourly; the job decides whether a scrape is actually due

permissions:
  contents: write

concurrency:
  group: odds-refresh
  cancel-in-progress: true

jobs:
  refresh-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Resolve day key + Athens guard
        id: day
        shell: bash
        env:
          INPUT_DAY_KEY: ${{ inputs.dayKey }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          ATHENS_HOUR_NUM=$((10#$(TZ=Europe/Athens date +%H)))
          if [ "$EVENT_NAME" = "schedule" ] && { [ "$ATHENS_HOUR_NUM" -lt 7 ] || [ "$ATHENS_HOUR_NUM" -gt 23 ]; }; then
            echo "Outside 07:00-23:59 Europe/Athens; skipping."
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          DAY_KEY="$(printf "%s" "${INPUT_DAY_KEY:-}" | grep -Eo '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -n1 || true)"
          [ -z "$DAY_KEY" ] && DAY_KEY="$(TZ=Europe/Athens date +%F)"
          echo "SKIP=false" >> "$GITHUB_ENV"
          echo "DAY_KEY=$DAY_KEY" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: npm install --no-audit --no-fund

      - name: Run gated odds refresh
        if: env.SKIP != 'true'
        shell: bash
        run: |
          set -euo pipefail
          FORCE_FLAG=""
          [ "${{ inputs.force }}" = "true" ] && FORCE_FLAG="--force"
          node ./engine-v1/jobs/run-odds-refresh.js "$DAY_KEY" $FORCE_FLAG | tee odds-refresh-result.json

      - name: Commit odds snapshot if changed
        if: env.SKIP != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --staged . || true

          ODDS_FILE="data/deploy-snapshots/${DAY_KEY}/odds.json"
          FIXTURES_FILE="data/deploy-snapshots/${DAY_KEY}/fixtures-all.json"
          [ -f "$ODDS_FILE" ] && git add "$ODDS_FILE"
          [ -f "$FIXTURES_FILE" ] && git add "$FIXTURES_FILE"

          if git diff --cached --quiet; then
            echo "No odds/fixtures changes to commit."
          else
            git commit -m "Refresh odds + fixtures snapshot for ${DAY_KEY}"
            git push
          fi
