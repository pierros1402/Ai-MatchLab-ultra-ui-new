name: Intraday deploy snapshot refresh

on:
  workflow_dispatch:
    inputs:
      dayKey:
        description: "Day key to refresh, YYYY-MM-DD. Leave empty for Europe/Athens today."
        required: false
        default: ""
  schedule:
    # Live-focused intraday refresh. Guard below limits execution to 07:00-23:59 Europe/Athens.
    # Two staggered schedules reduce missed/delayed GitHub scheduled runs without external paid cron.
    - cron: "*/5 * * * *"
    - cron: "2-59/5 * * * *"
permissions:
  contents: write
  issues: write

concurrency:
  group: intraday-deploy-snapshot-refresh
  cancel-in-progress: true

jobs:
  refresh-and-commit-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Resolve day key
        id: day
        shell: bash
        env:
          INPUT_DAY_KEY: ${{ inputs.dayKey }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          RAW_DAY_KEY="${INPUT_DAY_KEY:-}"
          DAY_KEY="$(printf "%s" "$RAW_DAY_KEY" | grep -Eo '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -n 1 || true)"

          ATHENS_HOUR="$(TZ=Europe/Athens date +%H)"
          ATHENS_MINUTE="$(TZ=Europe/Athens date +%M)"
          ATHENS_HOUR_NUM=$((10#$ATHENS_HOUR))

          if [ "$EVENT_NAME" = "schedule" ]; then
            if [ "$ATHENS_HOUR_NUM" -lt 7 ] || [ "$ATHENS_HOUR_NUM" -gt 23 ]; then
              echo "Skipping intraday run outside 07:00-23:59 Europe/Athens. Athens time: $ATHENS_HOUR:$ATHENS_MINUTE"
              echo "skipBuild=true" >> "$GITHUB_OUTPUT"
              echo "SKIP_BUILD=true" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          if [ -z "$DAY_KEY" ]; then
            DAY_KEY="$(TZ=Europe/Athens date +%F)"
          fi

          if ! printf "%s" "$DAY_KEY" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "ERROR: invalid DAY_KEY=$DAY_KEY"
            exit 1
          fi

          echo "skipBuild=false" >> "$GITHUB_OUTPUT"
          echo "SKIP_BUILD=false" >> "$GITHUB_ENV"
          echo "dayKey=$DAY_KEY" >> "$GITHUB_OUTPUT"
          echo "DAY_KEY=$DAY_KEY" >> "$GITHUB_ENV"
          echo "Resolved DAY_KEY=$DAY_KEY"

      - name: Install root dependencies
        if: env.SKIP_BUILD != 'true'
        run: npm install --no-audit --no-fund

      - name: Install engine dependencies
        if: env.SKIP_BUILD != 'true'
        working-directory: engine-v1
        run: npm install --no-audit --no-fund

      - name: Run intraday snapshot refresh
        if: env.SKIP_BUILD != 'true'
        run: node ./engine-v1/jobs/run-intraday-snapshot-refresh.js "$DAY_KEY" --chunks=0 --chunk-size=12 --days-back=1 --days-forward=14 --no-rebuild-details

      - name: Self-heal stale value artifacts
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          node ./engine-v1/jobs/verify-artifact-freshness-day.js --date="$DAY_KEY"

          if node - <<'NODE'
          const fs = require("fs");

          const day = process.env.DAY_KEY;
          const file = `data/deploy-snapshots/${day}/freshness-report.json`;
          const report = JSON.parse(fs.readFileSync(file, "utf8"));

          const valueKinds = new Set([
            "snapshot_value",
            "snapshot_value_audit",
            "plan_b",
            "plan_b_audit",
            "value_plan_comparison"
          ]);

          const staleValueArtifacts = Array.isArray(report.staleDerivedArtifacts)
            ? report.staleDerivedArtifacts.filter(entry =>
                valueKinds.has(String(entry?.kind || ""))
              )
            : [];

          console.log(JSON.stringify({
            staleValueArtifactCount: staleValueArtifacts.length,
            staleValueArtifacts: staleValueArtifacts.map(entry => ({
              kind: entry.kind,
              artifact: entry.artifact,
              staleReason: entry.staleReason
            }))
          }, null, 2));

          process.exit(staleValueArtifacts.length > 0 ? 0 : 1);
          NODE
          then
            echo "Value-derived artifacts are stale against canonical inputs — running targeted refresh."
            node ./engine-v1/jobs/refresh-value-artifacts-day.js --date="$DAY_KEY"
          else
            echo "Value-derived artifacts are current — skipping targeted refresh."
          fi

      # Intraday re-exports the snapshot, which would leave the committed
      # invariant report stale vs manifest.generatedAt — refresh it so the
      # nightly Invariant gate never trips on an intraday manifest.
      - name: Refresh and enforce snapshot invariant report
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          set -euo pipefail
          node ./engine-v1/jobs/run-snapshot-invariant-check.js "$DAY_KEY"
          node ./engine-v1/jobs/run-snapshot-invariant-check.js "$DAY_KEY" --gate
          node ./engine-v1/jobs/check-value-artifact-gate.js --date="$DAY_KEY"

      - name: Snapshot verification
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");

          const day = process.env.DAY_KEY;
          const manifestFile = `data/deploy-snapshots/${day}/manifest.json`;
          const fixturesFile = `data/deploy-snapshots/${day}/fixtures.json`;
          const valueFile = `data/deploy-snapshots/${day}/value.json`;
          const invariantFile = `data/deploy-snapshots/${day}/invariant-report.json`;
          const detailsDir = `data/deploy-snapshots/${day}/details`;

          for (const file of [manifestFile, fixturesFile, valueFile, invariantFile]) {
            if (!fs.existsSync(file)) {
              throw new Error(`missing required snapshot file: ${file}`);
            }
          }

          if (!fs.existsSync(detailsDir)) {
            throw new Error(`missing details dir: ${detailsDir}`);
          }

          const manifest = JSON.parse(fs.readFileSync(manifestFile, "utf8"));
          const fixtures = JSON.parse(fs.readFileSync(fixturesFile, "utf8"));
          const value = JSON.parse(fs.readFileSync(valueFile, "utf8"));
          const invariant = JSON.parse(fs.readFileSync(invariantFile, "utf8"));
          const details = fs.readdirSync(detailsDir).filter(f => f.endsWith(".json"));

          console.log(JSON.stringify({
            date: manifest.date,
            generatedAt: manifest.generatedAt,
            hash: manifest.hash,
            fixturesSource: manifest.fixturesSource,
            counts: manifest.counts,
            coverage: manifest.coverage,
            fixturesCount: fixtures.count,
            valueCount: value.count,
            valuePicks: Array.isArray(value.picks) ? value.picks.length : null,
            detailsFiles: details.length,
            invariantOk: invariant.ok,
            invariantValueSafe: invariant.valueSafe,
            invariantBlocked: Array.isArray(invariant.blocked) ? invariant.blocked.length : null
          }, null, 2));

          if (manifest.date !== day) {
            throw new Error(`manifest date mismatch: expected ${day}, got ${manifest.date}`);
          }

          if (!Number.isFinite(Number(fixtures.count)) || Number(fixtures.count) <= 0) {
            throw new Error("snapshot has zero fixtures");
          }

          if (!details.length) {
            throw new Error("snapshot has zero detail files");
          }

          if (invariant.ok !== true) {
            throw new Error("snapshot invariant report is not ok");
          }

          if (invariant.valueSafe === false) {
            throw new Error("snapshot invariant report marks value unsafe");
          }

          if (Array.isArray(invariant.blocked) && invariant.blocked.length > 0) {
            throw new Error(`snapshot invariant report has ${invariant.blocked.length} blocked issue(s)`);
          }
          NODE

      - name: Refresh value plan comparison settlement
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Cross-source verified FT truth for the WHOLE fixture universe, not
          # just value picks. This strengthens the FT-confirmation layer for
          # every match and never touches value settlement (which stays strictly
          # picks-scoped in the calls below). Runs first so the picks' own
          # final-results already exist when settlement reads them.
          if [ -f "data/deploy-snapshots/${DAY_KEY}/fixtures.json" ]; then
            node ./engine-v1/jobs/export-verified-final-results-day.js --date="$DAY_KEY" --write --all-fixtures
          else
            echo "No fixtures snapshot for ${DAY_KEY}; skipping all-fixtures final-result export."
          fi

          if [ -f "data/deploy-snapshots/${DAY_KEY}/value.json" ]; then
            node ./engine-v1/jobs/export-verified-final-results-day.js --date="$DAY_KEY" --write
          else
            echo "No production value file for ${DAY_KEY}; skipping Plan A final-result export."
          fi

          if [ -f "data/value-plans/${DAY_KEY}/plan-b.json" ]; then
            node ./engine-v1/jobs/export-verified-final-results-day.js --date="$DAY_KEY" --write --value-path="data/value-plans/${DAY_KEY}/plan-b.json"
            node ./engine-v1/jobs/build-value-plan-comparison-day.js --date="$DAY_KEY" --write
          else
            echo "No Plan B observation file for ${DAY_KEY}; skipping comparison settlement refresh."
          fi

      - name: Configure git author
        if: env.SKIP_BUILD != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Stage allowed generated files only
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Intraday refresh may persist status/score updates only for canonical
          # files that were already tracked for the selected day. New acquisition
          # files, other days, coverage reports and ingest state remain excluded.
          CANONICAL_STATUS_PATCH="${RUNNER_TEMP}/intraday-canonical-status-${DAY_KEY}.patch"

          git diff --binary --diff-filter=M -- \
            "data/canonical-fixtures/${DAY_KEY}/" \
            > "$CANONICAL_STATUS_PATCH"

          git restore -- data/canonical-fixtures data/coverage-reports data/ingest-state data/fixtures.json data/fixtures.json.bak 2>/dev/null || true
          git clean -fd -- data/canonical-fixtures data/coverage-reports data/ingest-state 2>/dev/null || true

          if [ -s "$CANONICAL_STATUS_PATCH" ]; then
            git apply --whitespace=nowarn "$CANONICAL_STATUS_PATCH"
          fi

          CANONICAL_STATUS_FILES="$(git diff --name-only --diff-filter=M -- "data/canonical-fixtures/${DAY_KEY}/" || true)"

          if [ -n "$CANONICAL_STATUS_FILES" ]; then
            while IFS= read -r canonical_file; do
              [ -n "$canonical_file" ] && git add -- "$canonical_file"
            done <<< "$CANONICAL_STATUS_FILES"
          fi

          test -e "data/deploy-snapshots/${DAY_KEY}/fixtures.json" && git add "data/deploy-snapshots/${DAY_KEY}/fixtures.json"
          test -e "data/deploy-snapshots/${DAY_KEY}/manifest.json" && git add "data/deploy-snapshots/${DAY_KEY}/manifest.json"
          test -e "data/deploy-snapshots/${DAY_KEY}/value.json" && git add "data/deploy-snapshots/${DAY_KEY}/value.json"
          if [ -f "data/deploy-snapshots/${DAY_KEY}/value-audit.json" ]; then git add "data/deploy-snapshots/${DAY_KEY}/value-audit.json"; fi
          if [ -f "data/value/${DAY_KEY}.json" ]; then git add "data/value/${DAY_KEY}.json"; fi
          if [ -f "data/value/_audit/${DAY_KEY}.json" ]; then git add "data/value/_audit/${DAY_KEY}.json"; fi
          if [ -d "data/value-plans/${DAY_KEY}" ]; then git add "data/value-plans/${DAY_KEY}/"; fi
          node ./engine-v1/jobs/build-system-health-alerts-day.js --date="${DAY_KEY}"

          test -e "data/deploy-snapshots/${DAY_KEY}/invariant-report.json" && git add "data/deploy-snapshots/${DAY_KEY}/invariant-report.json"
          # Freshness + build reports refreshed by run-intraday-snapshot-refresh.js
          # so they describe THIS re-exported manifest, not the earlier daily one.
          if [ -f "data/deploy-snapshots/${DAY_KEY}/freshness-report.json" ]; then git add "data/deploy-snapshots/${DAY_KEY}/freshness-report.json"; fi
          if [ -f "data/build-reports/${DAY_KEY}.json" ]; then git add "data/build-reports/${DAY_KEY}.json"; fi
          if [ -f "data/system-health/${DAY_KEY}.json" ]; then git add "data/system-health/${DAY_KEY}.json"; fi
          if [ -f "data/system-health/latest.json" ]; then git add "data/system-health/latest.json"; fi
          test -d "data/deploy-snapshots/${DAY_KEY}/details" && git add "data/deploy-snapshots/${DAY_KEY}/details"
          test -e "data/deploy-snapshots/latest.json" && git add "data/deploy-snapshots/latest.json"

          test -d "data/final-results/${DAY_KEY}" && git add "data/final-results/${DAY_KEY}/"
          test -e "data/value-comparison/${DAY_KEY}.json" && git add "data/value-comparison/${DAY_KEY}.json"

          STAGED="$(git diff --cached --name-only || true)"
          echo "Staged files:"
          printf "%s\n" "$STAGED"

          if [ -n "$STAGED" ]; then
            node engine-v1/jobs/guard-staged-data-boundary.js \
              --label=intraday-deploy-snapshot-refresh \
              --dayKey="${DAY_KEY}" \
              --allow="^(data/canonical-fixtures/${DAY_KEY}/[^/]+\.json$|data/deploy-snapshots/latest\.json$|data/deploy-snapshots/${DAY_KEY}/|data/build-reports/${DAY_KEY}\.json$|data/system-health/${DAY_KEY}\.json$|data/system-health/latest\.json$|data/value/${DAY_KEY}\.json$|data/value/_audit/${DAY_KEY}\.json$|data/value-plans/${DAY_KEY}/|data/final-results/${DAY_KEY}/|data/value-comparison/${DAY_KEY}\.json$)"

            BAD="$(printf "%s\n" "$STAGED" | grep -Ev '^(data/canonical-fixtures/|data/deploy-snapshots/|data/build-reports/|data/system-health/|data/value/|data/value-plans/|data/final-results/|data/value-comparison/)' || true)"
            if [ -n "$BAD" ]; then
              echo "ERROR: unexpected staged files:"
              echo "$BAD"
              exit 1
            fi
          fi

      - name: Sync System Health GitHub issue
        if: env.SKIP_BUILD != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node ./engine-v1/jobs/sync-system-health-github-issue.js --date="$DAY_KEY"

      - name: Detect material intraday snapshot changes
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          set -euo pipefail

          node - <<'NODE'
          const fs = require("fs");
          const { execFileSync } = require("child_process");

          const day = process.env.DAY_KEY;
          const file = `data/deploy-snapshots/${day}/fixtures.json`;

          function readJsonFromHead(path) {
            try {
              return JSON.parse(execFileSync("git", ["show", `HEAD:${path}`], { encoding: "utf8" }));
            } catch {
              return null;
            }
          }

          function readJsonFile(path) {
            if (!fs.existsSync(path)) return null;
            return JSON.parse(fs.readFileSync(path, "utf8"));
          }

          function rowsOf(payload) {
            if (!payload) return [];
            if (Array.isArray(payload)) return payload;
            if (Array.isArray(payload.matches)) return payload.matches;
            if (Array.isArray(payload.fixtures)) return payload.fixtures;
            if (Array.isArray(payload.items)) return payload.items;
            return [];
          }

          function idOf(row) {
            return String(row?.matchId ?? row?.id ?? row?.fixtureId ?? "").trim();
          }

          function isPreLike(row) {
            const statusText = [
              row?.status,
              row?.statusType,
              row?.rawStatus,
              row?.phase
            ]
              .map(value => String(value || "").toUpperCase())
              .join(" ");

            return /\b(PRE|SCHEDULED|STATUS_SCHEDULED|NOT_STARTED)\b/.test(statusText);
          }

          function materialScore(row, primaryField, fallbackField) {
            const value = row?.[primaryField] ?? row?.[fallbackField] ?? null;

            // Scheduled rows may be represented as either null-null or 0-0.
            // Neither representation is a real score/status change.
            if (value === null && isPreLike(row)) {
              return 0;
            }

            const numeric = Number(value);
            return Number.isFinite(numeric) ? numeric : value;
          }

          function material(row) {
            return {
              matchId: idOf(row),
              status: row?.status ?? null,
              statusType: row?.statusType ?? null,
              rawStatus: row?.rawStatus ?? null,
              phase: row?.phase ?? null,
              minute: row?.minute ?? null,
              scoreHome: materialScore(row, "scoreHome", "homeScore"),
              scoreAway: materialScore(row, "scoreAway", "awayScore"),
              live: row?.live ?? null,
              isLive: row?.isLive ?? null,
              staleLive: row?.staleLive ?? null,
              kickoffUtc: row?.kickoffUtc ?? row?.date ?? row?.startTime ?? row?.startUtc ?? null
            };
          }

          function normalize(payload) {
            const map = new Map();
            for (const row of rowsOf(payload)) {
              const id = idOf(row);
              if (id) map.set(id, material(row));
            }
            return [...map.entries()].sort(([a], [b]) => a.localeCompare(b));
          }

          const before = readJsonFromHead(file);
          const after = readJsonFile(file);

          const beforeNorm = normalize(before);
          const afterNorm = normalize(after);
          const materialChanged = JSON.stringify(beforeNorm) !== JSON.stringify(afterNorm);

          console.log(JSON.stringify({
            file,
            beforeRows: beforeNorm.length,
            afterRows: afterNorm.length,
            materialChanged
          }, null, 2));

          if (!materialChanged) {
            console.log("No material score/status/minute changes. Restoring staged deploy snapshot files to avoid timestamp-only commit.");
            execFileSync("git", ["restore", "--staged", "--", "data/deploy-snapshots"], { stdio: "inherit" });
            execFileSync("git", ["restore", "--", "data/deploy-snapshots"], { stdio: "inherit" });
            // build-reports/<day>.json lives outside deploy-snapshots; its only
            // change on an unchanged snapshot is a fresh generatedAt, so restore
            // it too or the commit-needed check below trips on a timestamp-only diff.
            // Guarded: a brand-new day may have no HEAD build-report to restore to.
            try {
              execFileSync("git", ["restore", "--staged", "--", `data/build-reports/${day}.json`], { stdio: "inherit" });
              execFileSync("git", ["restore", "--", `data/build-reports/${day}.json`], { stdio: "inherit" });
            } catch (e) {
              console.log(`build-reports restore skipped: ${e.message}`);
            }
          }

          const comparisonFile = `data/value-comparison/${day}.json`;

          function readJsonFromHeadOrNull(path) {
            try {
              return JSON.parse(execFileSync("git", ["show", `HEAD:${path}`], { encoding: "utf8" }));
            } catch {
              return null;
            }
          }

          function stripNonMaterialComparisonFields(value) {
            if (!value || typeof value !== "object") return value;
            const copy = JSON.parse(JSON.stringify(value));
            delete copy.generatedAt;
            return copy;
          }

          const comparisonBefore = readJsonFromHeadOrNull(comparisonFile);
          const comparisonAfter = readJsonFile(comparisonFile);

          if (comparisonBefore && comparisonAfter) {
            const beforeMaterial = stripNonMaterialComparisonFields(comparisonBefore);
            const afterMaterial = stripNonMaterialComparisonFields(comparisonAfter);
            const comparisonMaterialChanged = JSON.stringify(beforeMaterial) !== JSON.stringify(afterMaterial);

            console.log(JSON.stringify({
              comparisonFile,
              comparisonMaterialChanged
            }, null, 2));

            if (!comparisonMaterialChanged) {
              console.log("Only value-comparison generatedAt changed. Restoring comparison file to avoid timestamp-only commit.");
              execFileSync("git", ["restore", "--staged", "--", comparisonFile], { stdio: "inherit" });
              execFileSync("git", ["restore", "--", comparisonFile], { stdio: "inherit" });
            }
          }

          let commitNeeded = materialChanged;
          if (!commitNeeded) {
            try {
              execFileSync("git", ["diff", "--cached", "--quiet"], { stdio: "ignore" });
              commitNeeded = false;
            } catch {
              commitNeeded = true;
            }
          }

          const stagedFiles = execFileSync(
            "git",
            ["diff", "--cached", "--name-only"],
            { encoding: "utf8" }
          )
            .split(/\r?\n/)
            .map(value => value.trim())
            .filter(Boolean);

          const canonicalStatusChanged =
            stagedFiles.some(filePath =>
              filePath.startsWith(
                `data/canonical-fixtures/${day}/`
              ) &&
              filePath.endsWith(".json")
            );

          const finalCommitNeeded =
            commitNeeded || canonicalStatusChanged;

          console.log(JSON.stringify({
            materialChanged,
            canonicalStatusChanged,
            commitNeeded: finalCommitNeeded
          }, null, 2));

          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `INTRADAY_COMMIT_NEEDED=${finalCommitNeeded ? "true" : "false"}\n`
          );
          NODE

      - name: Commit and push snapshot changes
        if: env.SKIP_BUILD != 'true' && env.INTRADAY_COMMIT_NEEDED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git diff --cached --quiet; then
            echo "No intraday snapshot changes to commit."
            exit 0
          fi

          git commit -m "Intraday refresh deploy snapshot for ${DAY_KEY}"
          bash tools/git-push-rebase-retry.sh
          echo "INTRADAY_SNAPSHOT_PUSHED=true" >> "$GITHUB_ENV"

      - name: Notify Render to mirror the fresh snapshot (no deploy)
        if: env.SKIP_BUILD != 'true' && env.INTRADAY_SNAPSHOT_PUSHED == 'true'
        shell: bash
        run: |
          # Runtime snapshot sync — zero Render pipeline minutes (see the
          # daily workflow for details). Non-fatal by design.
          echo "Requesting snapshot sync for ${DAY_KEY}..."
          curl -fsS -m 150 "https://ai-matchlab-engine.onrender.com/ops/sync-snapshot?date=${DAY_KEY}" || echo "sync request failed (non-fatal)"

      - name: Automatic Render redeploy disabled by deploy-budget firewall
        if: ${{ false }}
        shell: bash
        env:
          RENDER_ENGINE_DEPLOY_HOOK_URL: ${{ secrets.RENDER_ENGINE_DEPLOY_HOOK_URL }}
          RENDER_UI_DEPLOY_HOOK_URL: ${{ secrets.RENDER_UI_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail

          if [ -n "${RENDER_ENGINE_DEPLOY_HOOK_URL:-}" ]; then
            echo "Triggering Render engine redeploy..."
            curl -fsS -X POST "${RENDER_ENGINE_DEPLOY_HOOK_URL}"
          else
            echo "RENDER_ENGINE_DEPLOY_HOOK_URL is not configured; skipping engine redeploy trigger."
          fi

          if [ -n "${RENDER_UI_DEPLOY_HOOK_URL:-}" ]; then
            echo "Triggering Render UI redeploy..."
            curl -fsS -X POST "${RENDER_UI_DEPLOY_HOOK_URL}"
          else
            echo "RENDER_UI_DEPLOY_HOOK_URL is not configured; skipping UI redeploy trigger."
          fi
