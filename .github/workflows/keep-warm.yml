name: Keep engine warm

# Render free web services spin down after ~15 min with no inbound traffic, and
# the cold spin-up that follows (~50s) is what makes the UI show "loading error"
# on the first visit. This pings /health every ~10 min so the instance never idles
# out. Any HTTP request resets Render's idle timer, so a cheap health ping is enough.
#
# Note: GitHub scheduled workflows can be delayed several minutes under load, so the
# 10-min cadence keeps a safety margin under Render's 15-min idle window. The client
# also tolerates a single missed ping (45s fetch timeout in assets/js/ui/app.js).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping engine /health (wake if asleep)
        shell: bash
        run: |
          URL="https://ai-matchlab-engine.onrender.com/health"
          for i in 1 2 3; do
            CODE="$(curl -s -m 55 -o /dev/null -w '%{http_code}' "$URL" || echo 000)"
            echo "attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "engine warm."
              exit 0
            fi
            sleep 15
          done
          # Don't spam failure emails every 10 min for a transient blip; the next
          # run retries. Surface it as a warning annotation instead of a hard fail.
          echo "::warning::engine /health did not return 200 after 3 attempts"
