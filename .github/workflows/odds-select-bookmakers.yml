# One-off utility: set the odds-api.io account's selected bookmakers using the
# repo's ODDS_API_IO_KEY secret — avoids any manual key handling. Dispatch it
# from the Actions tab (or `gh workflow run`) whenever the selection should
# change; the free tier serves only the selected bookmakers.
name: Odds bookmaker selection

on:
  workflow_dispatch:
    inputs:
      bookmakers:
        description: "Comma-separated bookmaker names (must match GET /v3/bookmakers exactly)"
        required: false
        default: "Bet365,Stoiximan"

jobs:
  select:
    runs-on: ubuntu-latest
    steps:
      - name: Select bookmakers and show the result
        env:
          KEY: ${{ secrets.ODDS_API_IO_KEY }}
          BOOKS: ${{ inputs.bookmakers }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${KEY:-}" ]; then echo "ODDS_API_IO_KEY secret is not set"; exit 1; fi

          ENC_BOOKS="$(python3 -c 'import urllib.parse,os; print(urllib.parse.quote(os.environ["BOOKS"]))')"

          echo "PUT /bookmakers/selected/select (${BOOKS})..."
          curl -sS -X PUT "https://api.odds-api.io/v3/bookmakers/selected/select?bookmakers=${ENC_BOOKS}&apiKey=${KEY}" || echo "(PUT request failed)"
          echo
          echo "GET /bookmakers/selected:"
          curl -sS "https://api.odds-api.io/v3/bookmakers/selected?apiKey=${KEY}" || echo "(GET request failed)"
          echo

      - name: Probe single-event /odds (with vs without bookmakers param)
        env:
          KEY: ${{ secrets.ODDS_API_IO_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          EV_ID="$(curl -sS "https://api.odds-api.io/v3/events?sport=football&status=pending&limit=1&apiKey=${KEY}" | python3 -c 'import json,sys; d=json.load(sys.stdin); d=d if isinstance(d,list) else d.get("data",[]); print(d[0]["id"] if d else "")')"
          if [ -z "$EV_ID" ]; then echo "no pending event found"; exit 0; fi
          echo "event id: ${EV_ID}"

          echo "— /odds WITHOUT bookmakers param:"
          curl -sS -o /tmp/a.json -w "HTTP %{http_code}\n" "https://api.odds-api.io/v3/odds?eventId=${EV_ID}&apiKey=${KEY}" || true
          head -c 400 /tmp/a.json; echo

          echo "— /odds WITH large bookmakers list:"
          curl -sS -o /tmp/b.json -w "HTTP %{http_code}\n" "https://api.odds-api.io/v3/odds?eventId=${EV_ID}&bookmakers=Bet365%2CStoiximan%2CUnibet%2CWilliam%20Hill&apiKey=${KEY}" || true
          head -c 400 /tmp/b.json; echo

          echo "— /odds WITH only selected (Bet365,Stoiximan):"
          curl -sS -o /tmp/c.json -w "HTTP %{http_code}\n" "https://api.odds-api.io/v3/odds?eventId=${EV_ID}&bookmakers=Bet365%2CStoiximan&apiKey=${KEY}" || true
          head -c 400 /tmp/c.json; echo
